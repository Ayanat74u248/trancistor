<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube → Текст</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #313237 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 700px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95em;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-weight: 600;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      margin: 20px 0;
      padding: 15px;
      border-radius: 8px;
      display: none;
      font-weight: 500;
    }

    .status.loading {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #e3f2fd;
      color: #1976d2;
      border: 2px solid #1976d2;
    }

    .status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 2px solid #2e7d32;
    }

    .status.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 2px solid #c62828;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(25, 118, 210, 0.3);
      border-top-color: #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-box {
      background: #f5f5f5;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      display: none;
      min-height: 100px;
      max-height: 400px;
      overflow-y: auto;
      line-height: 1.6;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .result-box.show {
      display: block;
    }

    .copy-button {
      margin-top: 10px;
      padding: 8px 15px;
      font-size: 0.9em;
    }

    .language-info {
      font-size: 0.85em;
      color: #666;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 1.5em;
      }

      .input-group {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎵 YouTube → Текст</h1>
  <p class="subtitle">Получите текст стенограммы из любого YouTube видео</p>

  <div class="input-group">
    <input 
      type="text" 
      id="url" 
      placeholder="Вставьте ссылку YouTube..."
      onkeypress="if(event.key === 'Enter') send()"
    >
    <button onclick="send()" id="submitBtn">Получить текст</button>
  </div>

  <div class="status" id="status"></div>

  <div class="result-box" id="result"></div>

  <div class="language-info" id="langInfo"></div>
</div>

<script>
async function send() {
  const url = document.getElementById("url").value;
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const submitBtn = document.getElementById("submitBtn");
  const langInfo = document.getElementById("langInfo");

  // Очищаем предыдущие результаты
  resultEl.textContent = "";
  resultEl.classList.remove("show");
  langInfo.textContent = "";
  statusEl.className = "status";

  // Валидация
  if (!url.trim()) {
    statusEl.className = "status error";
    statusEl.textContent = "❌ Пожалуйста, введите ссылку";
    return;
  }

  if (!url.includes("youtube.com") && !url.includes("youtu.be")) {
    statusEl.className = "status error";
    statusEl.textContent = "❌ Это не YouTube ссылка";
    return;
  }

  // Показываем загрузку
  statusEl.className = "status loading";
  statusEl.innerHTML = '<div class="spinner"></div> <span>Обработка видео... Это может занять время...</span>';
  submitBtn.disabled = true;

  try {
    const response = await fetch("http://127.0.0.1:8000/transcribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });

    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.detail || "Ошибка транскрипции");
    }

    const data = await response.json();

    if (data.text) {
      resultEl.textContent = data.text;
      resultEl.classList.add("show");

      statusEl.className = "status success";
      statusEl.textContent = "✅ Готово!";

      if (data.language && data.language !== "unknown") {
        langInfo.textContent = `Язык: ${data.language}`;
      }

      // Добавляем кнопку копирования
      setTimeout(() => {
        if (!document.getElementById("copyBtn")) {
          const copyBtn = document.createElement("button");
          copyBtn.id = "copyBtn";
          copyBtn.className = "copy-button";
          copyBtn.textContent = "📋 Скопировать текст";
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(data.text).then(() => {
              copyBtn.textContent = "✅ Скопирована!";
              setTimeout(() => {
                copyBtn.textContent = "📋 Скопировать текст";
              }, 2000);
            });
          };
          resultEl.parentNode.insertBefore(copyBtn, langInfo);
        }
      }, 100);
    } else {
      throw new Error("Видео не содержит речи или её не удалось распознать");
    }

  } catch (error) {
    statusEl.className = "status error";
    statusEl.textContent = `❌ Ошибка: ${error.message}`;
  } finally {
    submitBtn.disabled = false;
  }
}

// Фокус на ввод при загрузке
window.addEventListener("load", () => {
  document.getElementById("url").focus();
});
</script>

</body>
</html>
